name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Verify imports
        run: |
          uv run python -c "from tools.lib.console import console; print('console ok')"
          uv run python -c "from tools.lib.audio_utils import load_audio, save_audio; print('audio_utils ok')"
          uv run python -c "from tools.lib.model_utils import get_device; print('model_utils ok')"
